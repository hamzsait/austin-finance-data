    footer { text-align: center; color: var(--muted); font-size: 12px; padding: 24px;
             border-top: 1px solid var(--line); background: var(--headerband); }
    footer a { color: var(--navy); text-decoration: none; font-weight: 600; }
    footer a:hover { color: var(--accent); }

    @media (hover:none){
      .flipcard:hover .flipinner{transform:none}
      .flipcard:hover .face.front{pointer-events:auto}
      .face.back{display:none!important}
      .mobileonly{display:flex!important;margin-top:11px}

    @media (max-width:1080px){.cardgrid{grid-template-columns:repeat(3,1fr)}}

  </style>
</head>

<script>
const RACE_ID = 'district9';

const NAVY = '#18314f', MUTED = '#5b6b7a';
const PHOTOS = new Set(['au0','au1','au2','au3','au4','au5','au6','au7','au8','au9','au10','israel','kelly','ganguly','llanes','tc-brown','tc-travillion','tc-shea','tc-howard','tc-gomez','tc-morales','d1-goodwin','d1-ramos','d1-anderson','d1-stevenbrown','d1-riggins','d1-nahas','afp-d3-shah','afp-d5-weinberg','afp-d5-abraham','afp-d8-xie','afp-d8-bowen','afp-d8-hudsky','afp-d9-heyman','afp-d9-kam','afp-d9-thadani']);

function esc(s){ return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function money(n){
  if (n == null) return '—';
  if (n >= 1e6) return '$' + (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return '$' + Math.round(n/1e3) + 'K';
  return '$' + Math.round(n).toLocaleString();
}
function moneyExact(n){ return n == null ? '—' : '$' + Math.round(n).toLocaleString(); }
function prettyDate(iso){
  if (!iso) return '';
  const [y,m,d] = iso.split('-').map(Number);
  return new Date(Date.UTC(y, m-1, d)).toLocaleDateString('en-US',
    { month:'long', day:'numeric', year:'numeric', timeZone:'UTC' });
}

function photoHtml(key, name){
  if (key && PHOTOS.has(key)) return '<img src="/assets/photos/' + key + '.webp" alt="' + esc(name) + '" loading="lazy">';
  const initials = String(name).split(/\s+/).map(w => w[0] || '').join('').slice(0,3).toUpperCase();
  return '<div class="noimg">' + esc(initials) + '</div>';
}

function cardHtml(c){
  const live = !!c.stats;
  const href = c.slug ? '/austin/' + c.slug + '/' : null;
  const badge = c.status === 'incumbent'
    ? '<div class="stbadge incumbent">INCUMBENT</div>'
    : live
      ? '<div class="stbadge candidate">CANDIDATE</div>'
      : '<div class="stbadge pending">PENDING</div>';

  const metrics = live
    ? '<div class="metrics">'
      + '<div class="metric hot"><div class="mv">' + money(c.stats.raised) + '</div><div class="mk">Raised</div></div>'
      + '<div class="metric"><div class="mv">' + c.stats.donors.toLocaleString() + '</div><div class="mk">Donors</div></div>'
      + '<div class="metric"><div class="mv">$' + Math.round(c.stats.avg).toLocaleString() + '</div><div class="mk">Avg gift</div></div>'
      + '</div>'
    : '<div class="metrics"><div class="metric" style="flex:1"><div class="mv" style="color:' + MUTED + ';font-size:11.5px">'
      + esc(c.placeholder_note || 'No finance data on file yet') + '</div></div></div>';

  const cta = live
    ? '<a class="seemore mobileonly" href="' + href + '">See More<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"></path></svg></a>'
    : (c.website ? '<a class="seemore ghost mobileonly" href="' + esc(c.website) + '" target="_blank" rel="noopener noreferrer">Campaign site</a>' : '');

  const front = badge
    + '<div class="fm" style="font-family:\'Space Grotesk\',sans-serif;font-weight:700;font-size:9.5px;line-height:1.05;letter-spacing:.04em;color:' + NAVY + ';opacity:.6;margin-bottom:9px">FOLLOW<br>THE MONEY</div>'
    + '<div class="photoframe">' + photoHtml(c.photo, c.name) + '</div>'
    + '<div class="cardinfo" style="margin-top:12px">'
    +   '<div style="font-family:\'Space Grotesk\',sans-serif;font-weight:700;font-size:14px;letter-spacing:-.01em;color:' + NAVY + ';line-height:1.1">' + esc(c.name) + '</div>'
    +   '<div style="font-family:\'Space Grotesk\',sans-serif;font-weight:600;font-size:9px;letter-spacing:.04em;color:' + MUTED + ';margin-top:3px">' + esc(RACE_SEAT) + (c.status === 'incumbent' ? ' · Incumbent' : ' Candidate') + '</div>'
    +   metrics + cta
    + '</div>';

  let back;
  if (live && c.stats.topGroups && c.stats.topGroups.length){
    back = '<div style="display:flex;align-items:center;justify-content:space-between">'
      + '<span style="font-family:\'Oswald\',sans-serif;font-weight:700;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:' + NAVY + '">Top Industries</span>'
      + '<span style="font-family:\'Space Grotesk\',sans-serif;font-weight:600;font-size:9px;color:' + MUTED + '">This cycle</span></div>'
      + '<div style="flex:1;display:flex;flex-direction:column;justify-content:center;gap:11px;margin:4px 0">'
      + c.stats.topGroups.map(g =>
          '<div><div style="display:flex;justify-content:space-between;font-family:\'Space Grotesk\',sans-serif;font-size:9.5px;font-weight:600;color:#28394a;margin-bottom:4px"><span>' + esc(g.label) + '</span><span style="color:' + MUTED + '">' + money(g.amt) + '</span></div>'
          + '<div style="height:7px;border-radius:4px;background:rgba(24,49,79,.10);overflow:hidden"><div style="width:' + g.w + '%;height:100%;border-radius:4px;background:' + NAVY + '"></div></div></div>'
        ).join('') + '</div>'
      + '<a class="seemore" href="' + href + '">See More<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"></path></svg></a>';
  } else {
    back = '<div style="display:flex;align-items:center;justify-content:space-between">'
      + '<span style="font-family:\'Oswald\',sans-serif;font-weight:700;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:' + NAVY + '">About</span></div>'
      + '<div style="flex:1;display:flex;align-items:center;padding:6px 0"><span style="font-family:\'Inter\',sans-serif;font-size:11.5px;line-height:1.6;color:#28394a">' + esc(c.bio || '') + '</span></div>'
      + (c.website
          ? '<a class="seemore ghost" href="' + esc(c.website) + '" target="_blank" rel="noopener noreferrer">Campaign site</a>'
          : '<div class="seemore ghost" style="cursor:default">No campaign site found</div>');
  }

  return '<div class="flipcard"><div class="flipinner">'
    + '<div class="face front">' + front + '</div>'
    + '<div class="face back" style="display:flex;flex-direction:column;padding:15px 15px 14px">' + back + '</div>'
    + '</div></div>';
}

let RACE = null, RACE_SEAT = '', CANDS = [], SORT = 'alpha';

const SORTERS = {
  alpha:  (a,b) => lastName(a.name).localeCompare(lastName(b.name)),
  raised: (a,b) => (b.stats ? b.stats.raised : -1) - (a.stats ? a.stats.raised : -1),
  donors: (a,b) => (b.stats ? b.stats.donors : -1) - (a.stats ? a.stats.donors : -1),
  avg:    (a,b) => (b.stats ? b.stats.avg    : -1) - (a.stats ? a.stats.avg    : -1),
};
function lastName(n){ const p = String(n).trim().split(/\s+/); return p[p.length-1] + ' ' + p[0]; }

function renderGrid(){
  const sorted = CANDS.slice().sort(SORTERS[SORT]);
  document.getElementById('candidateGrid').innerHTML = sorted.map(cardHtml).join('');
}

function renderComparison(){
  const withData = CANDS.filter(c => c.stats).sort((a,b) => b.stats.raised - a.stats.raised);
  if (!withData.length){ document.getElementById('cmpSection').style.display = 'none'; return; }
  const max = withData[0].stats.raised || 1;
  document.getElementById('cmpBody').innerHTML = withData.map(c =>
    '<div class="cmprow">'
    + '<div class="cmpname">' + esc(c.name) + '</div>'
    + '<div class="cmptrack"><div class="cmpfill" style="width:' + Math.max(1.5, c.stats.raised / max * 100) + '%"></div></div>'
    + '<div class="cmpval">' + moneyExact(c.stats.raised) + '</div>'
    + '</div>').join('');
}

Promise.all([
  fetch('/austin_races.json').then(r => { if(!r.ok) throw new Error('races ' + r.status); return r.json(); }),
  fetch('/austin_race_stats.json').then(r => r.ok ? r.json() : {}),
]).then(([races, stats]) => {
  RACE = races.races.find(r => r.race_id === RACE_ID);
  if (!RACE) throw new Error('race ' + RACE_ID + ' not found in austin_races.json');
  RACE_SEAT = RACE.seat;

  document.getElementById('crumbSeat').textContent = RACE.seat;
  document.getElementById('raceEyebrow').textContent =
    (RACE.kind === 'open' ? 'Open seat' : 'Council race') + ' · General ' + prettyDate(RACE.election_date);
  document.getElementById('raceTitle').innerHTML =
    esc(RACE.seat) + ' <span>2026</span>';
  document.getElementById('raceIntro').textContent = RACE.intro;

  if (RACE.ballot_final){ document.getElementById('raceNotice').style.display = 'none'; }
  else { document.getElementById('raceNoticeTxt').innerHTML = '<strong>The field below is not final.</strong> ' + esc(RACE.context_note); }

  document.getElementById('raceFacts').innerHTML = [
    ['Filing opens',  prettyDate(RACE.filing_opens)],
    ['Filing closes', prettyDate(RACE.filing_closes)],
    ['General',       prettyDate(RACE.election_date)],
    ['Runoff if needed', prettyDate(RACE.runoff_date)],
    ['Data through',  prettyDate(RACE.data_through)],
  ].map(([k,v]) => '<div class="fact"><div class="k">' + esc(k) + '</div><div class="v">' + esc(v) + '</div></div>').join('');

  if (RACE.outgoing){
    const o = RACE.outgoing;
    document.getElementById('outgoingWrap').innerHTML =
      '<a class="outgoing" href="' + esc(o.href) + '">'
      + '<div class="op">' + photoHtml(o.photo, o.name) + '</div>'
      + '<div><div class="oname">' + esc(o.name) + '</div><div class="onote">Outgoing · ' + esc(o.note) + ' · view finance profile</div></div>'
      + '<span class="ogo"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"></path></svg></span>'
      + '</a>';
  }

  CANDS = RACE.candidates.map(c => ({ ...c, stats: (c.slug && stats[c.slug]) ? stats[c.slug] : null }));
  renderGrid();
  renderComparison();

  document.getElementById('methodology').textContent =
    'Figures cover the ' + RACE.election_date.slice(0,4) + ' election cycle — contributions reported from January 1, '
    + RACE.cycle_start_year + ' forward — so candidates who have run for office before are compared on this race alone, '
    + 'not on lifetime fundraising. Data is sourced from Austin City Clerk campaign finance filings and runs through '
    + prettyDate(RACE.data_through) + '. Candidates who have not filed a contribution report are shown without figures rather than as zero. '
    + 'Industry classifications are derived from employer identities, occupation records, and public information. All source data is public record.';

  document.getElementById('footUpdated').textContent = 'Data through ' + prettyDate(RACE.data_through);
}).catch(e => {
  document.getElementById('candidateGrid').innerHTML =
    '<p style="color:var(--muted);font-size:14px">Could not load race data: ' + esc(e.message) + '</p>';
});

document.getElementById('sortBtns').addEventListener('click', ev => {
  const btn = ev.target.closest('.sortbtn');
  if (!btn) return;
  SORT = btn.dataset.sort;
  document.querySelectorAll('.sortbtn').forEach(b =>
    b.setAttribute('aria-pressed', String(b === btn)));
  renderGrid();
});
</script>
</body>
</html>
